    --font-display: 'Govind', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
    --font-heading: 'Playfair Display', Georgia, 'Times New Roman', Times, serif;
    --font-body: Georgia, 'Times New Roman', Times, serif;
  }
  * { box-sizing: border-box; }
  html { color-scheme: light; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--font-body); line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
  a { color: var(--signal); }
  a:focus-visible { outline: 2px solid var(--signal); outline-offset: 3px; }
  .wrap { max-width: 1160px; margin: 0 auto; padding: 0 clamp(1.25rem, 4vw, 3rem); }
  .eyebrow { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--steel); }

  .masthead { position: fixed; top: 0; left: 0; right: 0; z-index: 40; display: flex; justify-content: center; padding: clamp(0.75rem, 2vw, 1.15rem) clamp(0.9rem, 3vw, 1.5rem); pointer-events: none; }
  .masthead-inner { pointer-events: auto; width: 100%; max-width: 1060px; display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 0.55rem 0.6rem 0.55rem 1.3rem; border-radius: 999px; background: var(--glass-bg); border: 1px solid var(--glass-brd); box-shadow: var(--glass-shadow); -webkit-backdrop-filter: blur(16px) saturate(1.5); backdrop-filter: blur(16px) saturate(1.5); }
  .brand { display: flex; align-items: center; gap: 0.55rem; text-decoration: none; color: var(--ink); flex-shrink: 0; }
  .brand-mark { width: 26px; height: 28px; display: block; background: var(--cube-logo) center / contain no-repeat; }
  .brand-word { font-family: var(--font-body); font-weight: 500; font-size: 1.08rem; letter-spacing: -0.01em; }
  nav.primary { display: flex; align-items: center; gap: clamp(1.9rem, 3.4vw, 3.4rem); }
  nav.primary .nav-link { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 0.74rem; letter-spacing: 0.07em; text-transform: uppercase; text-decoration: none; color: var(--ink); padding-bottom: 2px; border-bottom: 1px solid transparent; white-space: nowrap; transition: color 0.15s ease, border-color 0.15s ease; }
  nav.primary .nav-link:hover, nav.primary .nav-link[aria-current] { border-bottom-color: var(--sky-1); color: var(--sky-1); }
  .nav-join { display: inline-flex; align-items: center; gap: 0.5rem; font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 0.74rem; letter-spacing: 0.07em; text-transform: uppercase; text-decoration: none; color: #0A2E52; padding: 0.6rem 1.05rem; border-radius: 999px; background: linear-gradient(135deg, rgba(255,255,255,0.5), rgba(255,255,255,0.05)), linear-gradient(135deg, var(--sky-2), var(--sky-1)); border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 4px 14px rgba(30,144,255,0.35), 0 1px 0 rgba(255,255,255,0.7) inset; white-space: nowrap; flex-shrink: 0; transition: transform 0.15s ease; }
  .nav-join:hover { transform: translateY(-1px); }
  .nav-join .arrow { transition: transform 0.15s ease; }
  .nav-join:hover .arrow { transform: translateX(3px); }

  .page-header { padding: clamp(8rem, 16vw, 12rem) 0 clamp(2.5rem, 6vw, 4rem); background: linear-gradient(180deg, #F7F4EC 0%, var(--paper) 100%); }
  .page-title { font-family: var(--font-heading); font-weight: 800; font-size: clamp(3rem, 8vw, 6rem); line-height: 0.98; letter-spacing: -0.02em; margin: 0.8rem 0 0.6rem; color: var(--ink); }
  .page-sub { font-size: clamp(1.2rem, 2.4vw, 1.8rem); color: var(--steel); margin: 0; font-style: italic; }

  main { flex: 1 0 auto; }
  .team-body {
    position: relative;
    isolation: isolate;
    overflow: hidden;
    padding: clamp(5rem, 9vw, 8rem) 0 clamp(6rem, 11vw, 10rem);
    border: 0;
    background:
      linear-gradient(180deg, rgba(247,245,239,0) 0%, rgba(226,238,249,.64) 15%, rgba(218,233,247,.76) 52%, rgba(234,242,249,.52) 85%, rgba(247,245,239,0) 100%);
  }
  .team-body::before,
  .team-body::after {
    content: "";
    position: absolute;
    z-index: -1;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(8px);
  }
  .team-body::before {
    width: min(68vw, 850px);
    aspect-ratio: 1;
    left: -22vw;
    top: 3%;
    background: radial-gradient(circle, rgba(172,211,242,.42), rgba(209,229,244,.16) 48%, transparent 72%);
  }
  .team-body::after {
    width: min(58vw, 720px);
    aspect-ratio: 1;
    right: -18vw;
    bottom: -18%;
    background: radial-gradient(circle, rgba(183,215,242,.38), rgba(218,233,246,.13) 50%, transparent 74%);
  }
  .exec-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: clamp(1.2rem, 2.8vw, 2.4rem);
    align-items: start;
  }
  .exec-card {
    position: relative;
    padding: clamp(.65rem, 1.2vw, .85rem);
    border-radius: 20px;
    background: linear-gradient(145deg, rgba(255,255,255,.58), rgba(244,249,253,.3));
    border: 1px solid rgba(255,255,255,.76);
    box-shadow: 0 18px 44px rgba(55,84,115,.12), 0 1px 0 rgba(255,255,255,.9) inset;
    -webkit-backdrop-filter: blur(18px) saturate(1.2);
    backdrop-filter: blur(18px) saturate(1.2);
    transition: transform .28s cubic-bezier(.2,.8,.2,1), box-shadow .28s ease;
  }
  .exec-card:nth-child(2) { margin-top: clamp(3rem, 7vw, 6rem); }
  .exec-card:nth-child(3) { margin-top: clamp(.5rem, 2vw, 1.8rem); }
  .exec-card:nth-child(4) { margin-top: clamp(4.5rem, 9vw, 7.5rem); }
  .exec-card:hover {
    transform: translateY(-7px);
    box-shadow: 0 24px 54px rgba(55,84,115,.17), 0 1px 0 rgba(255,255,255,.94) inset;
  }
  .exec-photo {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 14px;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 34%, rgba(255,255,255,.72), transparent 24%),
      linear-gradient(145deg, rgba(204,218,231,.86), rgba(233,239,245,.74));
    border: 1px solid rgba(75,100,126,.12);
    box-shadow: 0 1px 0 rgba(255,255,255,.72) inset;
  }
  .exec-photo img { width: 100%; height: 100%; display: block; object-fit: cover; }
  .exec-meta { padding: .95rem .3rem .35rem; text-align: center; }
  .exec-name {
